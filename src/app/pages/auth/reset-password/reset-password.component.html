<div class="flex min-h-screen items-center justify-center bg-zinc-50 px-4 py-12 dark:bg-surface-950">
  <div class="w-full max-w-md animate-fade-in rounded-2xl tf-glass p-8 dark:bg-zinc-900/50">
    <div class="mb-6 text-center">
      <div class="mx-auto mb-4 flex h-12 w-12 items-center justify-center rounded-xl bg-emerald-500/15 ring-1 ring-emerald-500/25">
        <i class="fas fa-lock text-lg text-emerald-400"></i>
      </div>
      <h1 class="text-xl font-semibold text-zinc-900 dark:text-white">New password</h1>
      <p class="mt-2 text-sm text-zinc-500 dark:text-zinc-400">At least 8 characters.</p>
    </div>
    @if (success()) {
      <div class="mb-4 rounded-xl border border-emerald-500/25 bg-emerald-950/30 px-4 py-3 text-sm text-emerald-200">{{ success() }}</div>
    }
    @if (error()) {
      <div class="mb-4 rounded-xl border border-red-500/25 bg-red-950/30 px-4 py-3 text-sm text-red-200">{{ error() }}</div>
    }
    <form [formGroup]="resetPasswordForm" (ngSubmit)="onSubmit()" class="space-y-5">
      <div>
        <label for="password" class="mb-1.5 block text-xs font-semibold uppercase tracking-wider text-zinc-500">Password</label>
        <input id="password" type="password" formControlName="password" class="tf-input" />
      </div>
      <div>
        <label for="confirmPassword" class="mb-1.5 block text-xs font-semibold uppercase tracking-wider text-zinc-500">Confirm</label>
        <input id="confirmPassword" type="password" formControlName="confirmPassword" class="tf-input" />
      </div>
      <button type="submit" class="tf-btn-primary w-full bg-zinc-900 dark:bg-white dark:text-zinc-900"
        [disabled]="resetPasswordForm.invalid || loading() || resetPasswordForm.get('password')?.value !== resetPasswordForm.get('confirmPassword')?.value">
        @if (loading()) { <i class="fas fa-spinner fa-spin"></i> } @else { Update password }
      </button>
      <a routerLink="/login" class="block text-center text-sm font-medium text-accent-600 dark:text-accent-400">Back to sign in</a>
    </form>
  </div>
</div>
