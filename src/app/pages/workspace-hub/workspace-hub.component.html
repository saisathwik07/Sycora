<div class="animate-fade-in mx-auto flex max-w-3xl flex-col gap-8 pb-16 pt-4">
  <div>
    <h1 class="text-2xl font-semibold tracking-tight text-syn-ink dark:text-white">
      Choose how you want to use Syncora
    </h1>
    <p class="mt-2 text-sm text-syn-muted">
      Create a workspace for your team, discover public organizations, or explore as a guest with demo tasks.
    </p>
  </div>

  <div class="grid gap-4 md:grid-cols-3">
    <button
      type="button"
      routerLink="/organizations/new"
      class="tf-glass group rounded-2xl border border-transparent p-6 text-left transition hover:border-violet-300 hover:shadow-md dark:border-white/10 dark:hover:border-accent-500/40 dark:bg-zinc-900/40"
    >
      <div class="mb-3 flex h-10 w-10 items-center justify-center rounded-xl bg-gradient-to-br from-accent-600 to-indigo-600 text-white shadow-lg shadow-accent-500/25">
        <i class="fas fa-plus"></i>
      </div>
      <h2 class="font-semibold text-syn-ink dark:text-white">Create organization</h2>
      <p class="mt-2 text-sm text-syn-muted">Start a private or public workspace and invite teammates.</p>
      <span class="mt-4 inline-flex items-center gap-1 text-sm font-medium text-accent-600 dark:text-accent-400">
        Get started <i class="fas fa-arrow-right text-xs opacity-70 transition group-hover:translate-x-0.5"></i>
      </span>
    </button>

    <button
      type="button"
      (click)="continueBrowseMarketplace()"
      class="tf-glass group rounded-2xl border border-transparent p-6 text-left transition hover:border-violet-300 hover:shadow-md dark:border-white/10 dark:hover:border-accent-500/40 dark:bg-zinc-900/40"
    >
      <div class="mb-3 flex h-10 w-10 items-center justify-center rounded-xl bg-slate-100 dark:bg-white/10">
        <i class="fas fa-earth-americas text-accent-600 dark:text-accent-400"></i>
      </div>
      <h2 class="font-semibold text-syn-ink dark:text-white">Join existing</h2>
      <p class="mt-2 text-sm text-syn-muted">Browse public organizations and request to join.</p>
      <span class="mt-4 inline-flex items-center gap-1 text-sm font-medium text-accent-600 dark:text-accent-400">
        Marketplace <i class="fas fa-arrow-right text-xs opacity-70 transition group-hover:translate-x-0.5"></i>
      </span>
    </button>

    <button
      type="button"
      (click)="continueAsGuest()"
      [disabled]="loadingGuest()"
      class="tf-glass group rounded-2xl border border-transparent p-6 text-left transition hover:border-violet-300 hover:shadow-md disabled:opacity-60 dark:border-white/10 dark:hover:border-accent-500/40 dark:bg-zinc-900/40"
    >
      <div class="mb-3 flex h-10 w-10 items-center justify-center rounded-xl bg-slate-100 dark:bg-white/10">
        <i class="fas fa-user-clock text-syn-muted"></i>
      </div>
      <h2 class="font-semibold text-syn-ink dark:text-white">Continue as guest</h2>
      <p class="mt-2 text-sm text-syn-muted">Explore the UI, demo tasks, and public directory.</p>
      <span class="mt-4 text-sm font-medium text-syn-muted">
        @if (loadingGuest()) {
          Switching…
        } @else {
          Limited mode →
        }
      </span>
    </button>
  </div>

  <p class="text-center text-xs text-syn-muted">
    Private workspaces are invite-only. You can upgrade from guest anytime by creating or joining an organization.
  </p>
</div>
